<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>C360</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Mirrors dashboard/template.html's palette -- kept in sync manually since the
         CLI's static export and this SPA are two independent rendering shells around
         the same server-rendered section fragments. -->
    <style>
      :root {
        color-scheme: light;
        --surface-1:      #fcfcfb;
        --page-plane:     #f9f9f7;
        --text-primary:   #0b0b0b;
        --text-secondary: #52514e;
        --text-muted:     #898781;
        --gridline:       #e1e0d9;
        --axis-baseline:  #c3c2b7;
        --border:         rgba(11,11,11,0.10);
        --good:           #006300;
        --critical:       #d03b3b;
        --series-1:       #2a78d6;
      }
      @media (prefers-color-scheme: dark) {
        :root:where(:not([data-theme="light"])) {
          color-scheme: dark;
          --surface-1:      #1a1a19;
          --page-plane:     #0d0d0d;
          --text-primary:   #ffffff;
          --text-secondary: #c3c2b7;
          --text-muted:     #898781;
          --gridline:       #2c2c2a;
          --axis-baseline:  #383835;
          --border:         rgba(255,255,255,0.10);
          --good:           #0ca30c;
          --critical:       #e66767;
          --series-1:       #3987e5;
        }
      }
      :root[data-theme="dark"] {
        color-scheme: dark;
        --surface-1:      #1a1a19;
        --page-plane:     #0d0d0d;
        --text-primary:   #ffffff;
        --text-secondary: #c3c2b7;
        --text-muted:     #898781;
        --gridline:       #2c2c2a;
        --axis-baseline:  #383835;
        --border:         rgba(255,255,255,0.10);
        --good:           #0ca30c;
        --critical:       #e66767;
        --series-1:       #3987e5;
      }
      body {
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        background: var(--page-plane);
        color: var(--text-primary);
      }
      .tabular { font-variant-numeric: tabular-nums; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
