<div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
  {% for kpi in kpis %}
  <div class="rounded-lg p-4" style="background: var(--page-plane); border: 1px solid var(--border);">
    <div class="text-xs" style="color: var(--text-muted);">{{ kpi.label }}</div>
    <div class="text-xl font-semibold mt-1">{{ kpi.value }}</div>
    {% if kpi.delta %}
    <div class="text-xs mt-1 tabular" style="color: {{ 'var(--good)' if kpi.is_up else 'var(--critical)' }};">
      {{ kpi.delta }}
    </div>
    {% endif %}
  </div>
  {% endfor %}
</div>
