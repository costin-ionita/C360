<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page_title }} — Research Summary</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    color-scheme: light;
    --surface-1:      #fcfcfb;
    --page-plane:     #f9f9f7;
    --text-primary:   #0b0b0b;
    --text-secondary: #52514e;
    --text-muted:     #898781;
    --gridline:       #e1e0d9;
    --axis-baseline:  #c3c2b7;
    --border:         rgba(11,11,11,0.10);
    --good:           {{ good.light }};
    --critical:       {{ critical.light }};
  }
  @media (prefers-color-scheme: dark) {
    :root:where(:not([data-theme="light"])) {
      color-scheme: dark;
      --surface-1:      #1a1a19;
      --page-plane:     #0d0d0d;
      --text-primary:   #ffffff;
      --text-secondary: #c3c2b7;
      --text-muted:     #898781;
      --gridline:       #2c2c2a;
      --axis-baseline:  #383835;
      --border:         rgba(255,255,255,0.10);
      --good:           {{ good.dark }};
      --critical:       {{ critical.dark }};
    }
  }
  :root[data-theme="dark"] {
    color-scheme: dark;
    --surface-1:      #1a1a19;
    --page-plane:     #0d0d0d;
    --text-primary:   #ffffff;
    --text-secondary: #c3c2b7;
    --text-muted:     #898781;
    --gridline:       #2c2c2a;
    --axis-baseline:  #383835;
    --border:         rgba(255,255,255,0.10);
    --good:           {{ good.dark }};
    --critical:       {{ critical.dark }};
  }
  body { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
  .tabular { font-variant-numeric: tabular-nums; }
</style>
</head>
<body class="min-h-screen" style="background: var(--page-plane); color: var(--text-primary);">
  <div class="max-w-4xl mx-auto px-6 py-10 space-y-8">

    {% if header %}
    <header class="space-y-1">
      {{ header.html | safe }}
    </header>
    {% endif %}

    {% for section in sections %}
    <section class="rounded-lg p-5" style="background: var(--surface-1); border: 1px solid var(--border);">
      {% if section.title %}
      <h2 class="text-sm font-semibold mb-3" style="color: var(--text-secondary);">{{ section.title }}</h2>
      {% endif %}
      {{ section.html | safe }}
    </section>
    {% endfor %}

  </div>
</body>
</html>
